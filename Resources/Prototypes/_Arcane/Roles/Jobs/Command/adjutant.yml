- type: job
  id: Adjutant
  name: job-name-adjutant
  description: job-description-adjutant
  playTimeTracker: JobAdjutant
  requirements:
  - !type:DepartmentTimeRequirement
    department: Security
    time: 18000 # 5 hrs
  - !type:DepartmentTimeRequirement
    department: Engineering
    time: 18000 # 5 hrs
  - !type:DepartmentTimeRequirement
    department: Medical
    time: 18000 # 5 hrs
  startingGear: AdjutantGear
  icon: JobIconAdjutant
  supervisors: job-supervisors-command
  setPreference: true
  goobcoins: 40
  salary: 100
  payrollDepartmentAccount: Command
  access:
    - Command
    - Bar
    - Service
    - Maintenance
    - Janitor
    - Theatre
    - Kitchen
    - Chapel
    - Hydroponics
    - Engineering
    - Research
    - Brig
    - Cargo
    - Medical
  special:
  - !type:AddComponentSpecial
    components:
      - type: CommandStaff
      - type: Condemned
        soulOwnedNotDevil: true
      - type: AdditionalLanguage
        speaks:
        - CorporateCodespeak
        understands:
        - CorporateCodespeak
  contracts:
  - DocumentContractEmploymentCommand

- type: startingGear
  id: AdjutantGear
  equipment:
    shoes: ClothingShoesBootsLaceup
    eyes: ClothingEyesGlassesSunglasses
    id: AdjutantPDA
    ears: ClothingHeadsetAdjutant
    neck: ClothingNeckMantleAdjutant
  storage:
    back:
    - Flash
    - RubberStampAdj
    - TelescopicBaton

- type: chameleonOutfit
  id: AdjutantChameleonOutfit
  job: Adjutant
  equipment:
    head: ClothingHeadHatBeretAdjutant
    eyes: ClothingEyesGlassesSunglasses
    neck: ClothingNeckMantleAdjutant
