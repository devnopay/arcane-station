- type: entity
  id: BaseEroticOrgan
  parent: BaseHumanOrgan
  abstract: true
  components:
  - type: Organ
    canEnable: true
    removable: false

# Universal (all sexes)
# External — shows in health scanner.
- type: entity
  id: OrganButt
  parent: BaseEroticOrgan
  name: butt
  description: A pair of buttocks.
  components:
  - type: Sprite
    sprite: _Arcane/Mobs/Organs/anus.rsi
    state: default
  - type: Organ
    slotId: butt
    removable: false
  - type: EroticOrgan
    sensitivity: 0.9
  - type: ButtOrgan

# Internal muscle — no integrity display in health scanner.
